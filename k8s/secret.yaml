apiVersion: v1
kind: Secret
metadata:
  name: aboa-secrets
  namespace: aboa
type: Opaque
stringData:
  SECRET_KEY: "CHANGE_THIS_IN_PRODUCTION_DEPLOYMENT"
  DATABASE_URL: "postgresql://username:password@postgres-service:5432/aboa_prod"
  VECTOR_DB_URL: "http://chroma-service:8000"
  N8N_WEBHOOK_URL: "https://n8n.your-domain.com/webhook"
  N8N_API_KEY: "CHANGE_THIS_N8N_API_KEY"
  ALLOWED_ORIGINS: "https://your-domain.com,https://app.your-domain.com"