apiVersion: apps/v1
kind: Deployment
metadata:
  name: aboa-app
  namespace: aboa
  labels:
    app: aboa-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aboa-app
  template:
    metadata:
      labels:
        app: aboa-app
    spec:
      containers:
      - name: aboa-app
        image: aboa:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: aboa-config
        - secretRef:
            name: aboa-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: data
          mountPath: /app/data
      volumes:
      - name: logs
        emptyDir: {}
      - name: data
        persistentVolumeClaim:
          claimName: aboa-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: aboa-service
  namespace: aboa
  labels:
    app: aboa-app
spec:
  selector:
    app: aboa-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aboa-data-pvc
  namespace: aboa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi