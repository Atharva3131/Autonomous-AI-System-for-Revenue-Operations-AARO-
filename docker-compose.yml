version: '3.8'

services:
  # Backend API Service
  aboa-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - SECRET_KEY=demo-secret-key-change-in-production
      - DATABASE_URL=sqlite:///./demo.db
      - VECTOR_DB_URL=http://chroma:8000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - chroma
    networks:
      - aboa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend UI Service
  aboa-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://aboa-api:8000
    depends_on:
      - aboa-api
    networks:
      - aboa-network
    restart: unless-stopped

  # Vector Database
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - aboa-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional - for single domain)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/demo.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - aboa-api
      - aboa-ui
    networks:
      - aboa-network
    restart: unless-stopped

volumes:
  chroma_data:

networks:
  aboa-network:
    driver: bridge